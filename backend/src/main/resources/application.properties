# App
spring.application.name=trading-simulator
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/trading_simulator
spring.datasource.username=trading_user
spring.datasource.password=trading123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Scheduling
spring.task.scheduling.pool.size=5

# JWT
app.jwt.secret=trading_simulator_super_secret_key_minimum_32chars_long
app.jwt.expiration-ms=86400000
